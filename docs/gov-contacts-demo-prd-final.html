  <textarea id="md" style="display:none;"># 政务通讯录管理后台需求文档（PRD）- 增强版

## 1. 新手导读

### 1.1 产品一句话
`gov-contacts-demo` 是一个面向政务组织管理场景的通讯录与组织协同后台，覆盖组织架构、人员任职、审批流、条线管理、可见性规则与展示配置，为政务组织提供统一的人员信息治理平台。

### 1.2 为什么做
- 政务组织层级深、跨部门协作频繁，传统通讯录无法承载"行政区划+条线+任职"复杂关系。
- "谁可以看谁、看哪些字段"的规则复杂，缺少统一配置与验证能力。
- 人员转调、外部协作接入等高频变更场景需要流程化与可追踪。
- 现有系统数据分散，缺乏统一的治理入口和流程闭环。

### 1.3 核心价值
- **统一治理**：组织、人员、条线、权限规则在同一平台管理，实现数据一致性。
- **流程闭环**：转调审批 -> 生效执行 -> 数据同步 -> 规则重算，减少人工干预。
- **可控可验**：规则配置可验证、关键动作可追踪、结果可验收，提高系统可靠性。
- **灵活扩展**：支持自定义字段、展示配置，适应不同政务组织的个性化需求。

### 1.4 阅读建议
- 首次阅读：先看第 2、3、4 章建立整体认知。
- 研发测试：重点看第 5、6、7、8、9、10 章。
- 运营复盘：重点看第 13 章埋点方案与指标口径。
- 数据建模：重点看第 12 章数据结构与字段字典。

## 2. 文档概述

### 2.1 需求概述
#### 2.1.1 需求背景
- 政务组织天然具备多层级、多条线、跨单位协作等复杂特征，传统通讯录产品难以同时承载组织关系、任职关系和权限关系。
- 人员转调、外部人员接入、临时专班等场景变化频繁，若缺少流程与规则支撑，容易出现数据不一致、权限越界、协同效率低等问题。
- 当前项目需要形成可演示、可扩展、可落地的政务通讯录治理样板，为后续真实后端接入和行业化复制打基础。
- 随着政务数字化转型的深入，对人员信息管理的安全性、准确性、实时性要求日益提高。

#### 2.1.2 需求价值
- **管理价值**：统一组织、人员、条线、规则配置入口，降低治理复杂度，提高管理效率。
- **业务价值**：建立"发起-审批-生效-重算"闭环流程，减少人工干预和流程断点，确保数据及时更新。
- **产品价值**：沉淀政务场景标准能力模型，支持后续跨项目快速复制，形成行业解决方案。
- **安全价值**：通过细粒度的可见性规则和权限控制，保障敏感信息安全，符合政务数据安全要求。

### 2.2 文档目标
明确当前版本需求边界、功能设计、交互规则、异常策略、验收标准和数据追踪方案，确保产品、设计、研发、测试、运营对交付标准一致，为系统开发和验收提供明确依据。

### 2.3 适用范围
- 前端后台系统：Vue3 + Element Plus + Vue Router。
- 数据层：Mock Provider（本地存储），预留 Real Provider 结构。
- 范围覆盖：组织/人员、审批中心、外部人员、条线/区划、可见性、展示配置、自定义字段。
- 本期不包括：真实后端接口开发、大规模数据性能优化、生产级监控系统集成。

### 2.4 涉及客户端类型
- 管理后台 Web 端（当前已实现并作为主交付载体）。
- Android 客户端（后续用于通讯录查看、名片展示、消息协同等场景）。
- iOS 客户端（后续用于通讯录查看、名片展示、消息协同等场景）。
- Harmony 客户端（后续用于政务终端国产化适配场景）。
- 其他端形态（小程序/桌面端）本期不纳入实现范围，但数据结构需保持可扩展。

### 2.5 目标读者
- 产品经理、设计师、前端/后端工程师、测试工程师、项目实施与运营人员。
- 政务组织的管理人员和使用人员。

### 2.6 版本信息
- 文档版本：V2.0（产品总监增强版）
- 项目版本：`gov-contacts-demo` 当前主分支
- 日期：2026-04-24
- 上次更新：2026-04-24

### 2.7 术语定义
- **主职/兼职/挂职/借调**：人员在不同组织下的任职关系类型。
- **条线**：跨组织的业务管理维度（如教育、公安、政协）。
- **可见性规则**：控制"查看、搜索、私聊"等场景中的可见权限规则。
- **临时组织/专班**：具有生效周期的组织实体，需到期提醒。
- **转调**：人员在不同部门或条线之间的调动。
- **外部人员**：非本组织正式编制，但需要临时访问系统的人员。
- **审批单**：记录人员转调、外部人员接入等流程的单据。
- **待生效队列**：存放定时生效任务的队列。

## 3. 产品目标与用户

### 3.1 业务目标
- 构建政务通讯录管理底座，形成可复用的组织治理能力。
- 打通"信息维护-审批变更-权限重算"的闭环链路，确保数据一致性。
- 支持外部协作与临时组织，提升复杂协同场景承载能力。
- 提供灵活的配置能力，满足不同政务组织的个性化需求。
- 建立完善的埋点体系，为运营和优化提供数据支撑。

### 3.2 用户目标
- 管理员可低成本完成组织信息治理与变更控制，提高管理效率。
- 普通用户可基于权限稳定查看准确联系人信息，方便日常工作。
- 审批角色可高效处理变更流程，减少线下沟通成本，确保流程规范。
- 系统使用简单直观，降低学习成本，提高用户满意度。

### 3.3 角色分层
- `platform_admin`：平台级全局管理权限，可访问所有功能模块，进行全局配置。
- `org_admin`：组织级管理权限，可管理本组织及其下属组织的人员和审批。
- `user`：基础查看权限（无法执行管理动作），可查看授权范围内的人员信息。

### 3.4 版本范围
- **In Scope**
  - 组织、人员、任职、秘书关系管理。
  - 转调审批与定时生效。
  - 外部人员审批与到期检查。
  - 条线/行政区划节点管理。
  - 可见性配置与验证、展示配置、自定义字段配置。
  - 基础埋点与数据追踪。
- **Out of Scope**
  - 真实后端接口与鉴权系统。
  - 生产级日志中心、监控平台集成。
  - 大规模数据性能优化专项。
  - 移动端应用开发。

#### 4.2.9 当前版本功能点总量
- 总计：**124 个功能点**
- 建议排期方式：先交付 P0 主流程功能点（组织+审批+可见性）再逐步扩展配置能力。
- 优先级策略：P0 功能必须在首版实现，P1 功能在首版或次版实现，P2 功能可在后续版本实现。

### 4.3 模块间关系
#### 4.3.1 主数据上下游关系（组织/人员为数据源头）
- 组织架构与人员管理模块是全局主数据源，负责维护 `部门、人员、任职、秘书关系`。
- 条线通讯录、可见性配置、展示配置均消费该主数据，不可绕过主数据直接改写结果数据。
- 任职信息与人员主字段存在同步关系：主职变更后，人员主部门、职务等展示字段需同步更新。
- 外部人员管理和临时组织提醒作为主数据的扩展，补充管理边界。

#### 4.3.2 审批链路与回写关系（流程驱动数据变更）
- 转调流程由组织架构模块发起，审批中心承接并处理。
- 审批通过后由审批中心回写人员主数据（部门、条线、任职），并记录流程日志。
- 定时生效场景通过待生效队列异步执行，执行完成后状态需在"审批单、队列、人员主数据"三处一致。
- 外部人员审批流程类似，审批通过后激活账号，到期后自动禁用。

#### 4.3.3 权限与规则关系（控制谁能做、谁能看）
- 角色权限（`platform_admin/org_admin/user`）首先决定操作权限（能否配置、审批、批量操作）。
- 可见性规则在权限之上进一步控制"看见谁、搜到谁、能否发起私聊"等数据可见范围。
- 规则冲突时遵循优先级策略（不可见优先于可见），并通过验证模块给出命中规则解释。
- 权限变更后，相关规则需重新计算并生效。

#### 4.3.4 展示配置与业务数据关系（同数据，不同呈现）
- 展示配置不改变主数据，仅改变前端呈现方式（字段展示、路径展示、卡片分组）。
- 个人卡片配置与可见性规则协同生效：先判断字段是否可见，再按展示配置决定显示顺序与样式。
- 移动端演示页面应复用同一套字段语义，避免"后台字段定义"与"移动端展示"口径不一致。
- 展示配置变更后，需实时预览效果，确保配置正确。

#### 4.3.5 条线/区划与组织关系（横纵双维治理）
- 行政区划与条线编码提供基础字典能力，为组织治理与权限分配提供维度标签。
- 部门可绑定区划与条线，条线通讯录节点可映射部门与人员，形成"组织层级 + 业务条线"双视角。
- 当编码或节点变更时，依赖该维度的筛选、展示、规则配置需联动校验。
- 条线通讯录支持跨部门人员管理，满足业务条线的协同需求。

#### 4.3.6 外部协作与临时组织关系（扩展治理边界）
- 外部人员管理在主组织体系外扩展协作边界，但仍受审批与可见性规则约束。
- 临时组织提醒模块基于组织周期属性运行，不改写组织主数据，仅输出治理提醒状态。
- 到期禁用（外部人员）与到期提醒（临时组织）属于治理动作，应沉淀日志用于追溯。
- 外部人员和临时组织的管理应与主组织体系隔离，避免数据混淆。

#### 4.3.7 埋点与运营复盘关系（数据闭环）
- 各模块关键动作通过埋点接入统一事件模型，支撑漏斗、失败率、规则命中率分析。
- 重点链路（转调、审批、可见性验证、导入导出）需有统一 `request_id` 贯穿。
- 运营复盘基于模块关系做归因：区分"主数据问题、流程问题、规则问题、展示问题"。
- 埋点数据应定期分析，识别系统优化机会和用户行为模式。

#### 4.3.8 联调与测试依赖建议
- 联调顺序建议：主数据模块 -> 审批回写 -> 规则验证 -> 展示配置 -> 埋点校验。
- 回归测试应覆盖跨模块场景：如"人员转调通过后，可见性结果变化 + 通讯录展示变化 + 埋点事件完整"。
- 任一模块上线前需检查其对上下游模块的数据契约影响，避免局部改动引发全链路回归问题。
- 测试数据应覆盖正常场景和边界场景，确保系统稳定性。

## 6. 业务流程描述（文字泳道）

### 6.1 人员转调流程
1. 管理员在组织架构页发起转调。
2. 系统创建审批单（待审批）。
3. 审批中心处理通过/驳回。
4. 通过后按生效方式执行：
   - 立即生效：直接更新人员主职部门与条线；
   - 定时生效：进入待生效队列，定时任务执行。
5. 执行后记录审批日志、更新队列状态、写入可见性重算日志。

```mermaid
flowchart TD
  A[组织架构页发起转调] --> B[创建审批单: 待审批]
  B --> C{审批结果}
  C -->|驳回| D[审批结束: 状态=审批驳回]
  C -->|通过| E{生效方式}
  E -->|立即生效| F[更新人员主数据 部门/条线/主职]
  E -->|定时生效| G[写入待生效队列: 状态=待生效]
  G --> H[到点任务执行]
  H --> F
  F --> I[写审批日志与可见性重算日志]
  I --> J[流程完成]
```

### 6.1.1 定时生效子流程
1. 审批通过且生效方式为定时。
2. 审批单进入待生效队列。
3. 到达生效日期后任务调度执行。
4. 同步更新审批单状态、队列状态、人员主数据。

```mermaid
flowchart LR
  A[审批通过 定时生效] --> B[入队 pending]
  B --> C{到达生效日期?}
  C -->|否| B
  C -->|是| D[执行生效任务]
  D --> E[更新人员主数据]
  D --> F[更新审批单: 已生效]
  D --> G[更新队列: done/skipped]
  E --> H[写日志并触发规则重算]
  F --> H
  G --> H
```

### 6.2 外部人员接入流程
1. 提交外部人员申请。
2. 审批通过后启用；驳回则结束。
3. 定期执行到期检查，自动禁用过期账号。

```mermaid
flowchart TD
  A[提交外部人员申请] --> B[状态=审批中]
  B --> C{审批结果}
  C -->|通过| D[状态=正常]
  C -->|驳回| E[状态=驳回]
  D --> F[定期到期检查]
  F --> G{是否到期}
  G -->|是| H[状态=已到期禁用]
  G -->|否| I[保持正常]
```

### 6.3 可见性规则验证流程
1. 选择查看者、目标人员、场景。
2. 规则引擎返回命中规则与结果。
3. 结果入库到验证日志，支持追溯。

```mermaid
flowchart TD

  F -->|不可见| H[返回不可见 + 命中规则]
  G --> I[写入验证日志]
  H --> I
```

## 7. 表单校验与规则

### 7.1 人员表单
- 姓名必填。
- 任职记录至少一条。
- 密码重置需二次一致。
- 手机号格式验证（11位数字）。
- 邮箱格式验证。
- 身份证号格式验证（18位）。
- 日期字段格式验证。

### 7.2 转调表单
- 必填：转调人员、目标部门、目标条线。
- 若定时生效：生效日期必填且必须为未来日期。
- 转调人员必须存在且状态正常。

### 7.3 外部人员表单
- 必填：姓名、外部组织、到期日期。
- 到期日期必须为未来日期。
- 数据范围必须为已存在的部门。

### 7.4 规则验证表单
- 必填：查看者、目标人员。
- 场景必须为预定义选项之一。

### 7.5 部门表单
- 部门名称必填。
- 上级部门必须存在。
- 部门编码唯一性验证。

### 7.6 条线/区划表单
- 节点名称必填。
- 节点编码唯一性验证。
- 上级节点必须存在。

### 7.7 统一规则
- 权限不足则禁止操作并提示。
- 关键删除动作必须二次确认。
- 表单提交前必须通过所有校验。
- 操作成功/失败必须有明确提示。
- 批量操作必须有进度反馈。

---

## 8. 异常与边界场景

### 8.1 权限异常
- 非管理角色访问受限页面，自动跳转默认页。
- 非管理角色触发审批/配置动作，系统提示无权限。
- 权限变更后，已打开的页面需重新校验权限。

### 8.2 数据异常
- 详情页目标数据不存在：提示后返回列表。
- 列表空数据：统一空态组件反馈。
- 数据加载失败：显示错误提示并支持重试。
- 数据保存失败：显示错误原因并支持重新提交。

### 8.3 流程异常
- 审批中心加载失败显示错误并支持重试。
- 定时任务遇到丢失审批单，标记 `skipped` 并不中断任务。
- 流程执行超时：显示超时提示并支持手动触发。
- 流程状态不一致：提供状态修复机制。

### 8.4 输入异常
- 必填未填、格式不正确、日期不合法时阻断提交并提示。
- 导入预检失败时提供行级错误明细下载。
- 批量操作时部分失败：显示失败原因并提供重试选项。
- 重复提交：防止表单重复提交，显示提交中状态。

### 8.5 系统异常
- 网络异常：显示网络错误提示并支持离线操作（如草稿保存）。
- 浏览器兼容性问题：提示用户使用推荐浏览器。
- 系统崩溃：提供错误日志收集和反馈机制。

## 9. 非功能需求

### 9.1 兼容性
- 支持主流 Chromium 浏览器（Chrome/Edge 现代版本）。
- 桌面端优先，关键页面支持基础响应式。
- 分辨率支持：1024x768 及以上分辨率。
- 支持 Windows、macOS、Linux 等主流操作系统。

### 9.2 性能
- 列表数据采用分页机制，避免一次性渲染过多。
- 图表按需初始化，减少首页首屏压力。
- 页面加载时间：首屏加载 < 3秒，后续页面 < 2秒。
- 数据查询响应时间：简单查询 < 1秒，复杂查询 < 3秒。
- 支持至少 10,000 条人员数据的管理。

### 9.3 安全
- 当前角色控制仅用于演示；生产环境需后端鉴权兜底。
- 涉敏字段（手机号等）需支持脱敏与访问审计。
- 操作日志需记录关键动作，支持追溯。
- 数据传输需加密，防止数据窃取。
- 防止 XSS、CSRF 等常见安全攻击。

### 9.4 可维护性
- Provider 抽象清晰，便于 Mock -> Real 迁移。
- 本地缓存 key 按域隔离，降低数据污染风险。
- 代码结构清晰，模块化设计，便于扩展和维护。
- 完善的注释和文档，便于后续开发和维护。
- 支持配置化管理，减少硬编码。

### 9.5 可用性
- 系统可用性目标：99.9%。
- 关键操作有进度反馈，避免用户焦虑。
- 错误提示清晰明确，引导用户正确操作。
- 支持操作撤销和恢复机制。
- 提供帮助文档和操作指南。

## 10. 验收标准（Definition of Done）

### 10.1 功能验收
- 人员新增/编辑/删除全链路可用，数据保存正确。
- 转调流程支持提交、审批、立即生效、定时生效，状态流转正确。
- 外部人员支持申请、审批、到期禁用，状态管理正确。
- 条线节点与成员排序可保存并复显，数据一致性良好。
- 可见性验证返回命中规则与结果，并可查看日志。
- 自定义字段支持添加、编辑、删除，与表单联动正确。
- 展示配置支持实时预览，效果符合预期。
- 编码管理支持导入导出，数据完整性保持。

### 10.2 交互验收
- 关键操作有明确成功/失败反馈，用户体验良好。
- 空态、加载态、错误态完备，视觉反馈清晰。
- 高风险操作有二次确认，防止误操作。
- 表单校验实时反馈，引导用户正确输入。
- 页面跳转流畅，无卡顿现象。

### 10.3 权限验收
- 管理角色可操作管理功能，权限控制有效。
- 普通角色不可访问或不可操作受限功能，权限边界清晰。
- 权限变更后，相关功能立即生效，无需刷新页面。

### 10.4 数据一致性验收
- 转调生效后人员主数据与审批状态保持一致，无数据冲突。
- 定时任务执行后队列状态与审批日志一致，状态同步正确。
- 外部人员到期检查后状态更新正确，无遗漏。
- 条线通讯录成员变更后，相关展示同步更新。

### 10.5 性能验收
- 页面加载时间符合要求，首屏加载 < 3秒。
- 数据查询响应时间符合要求，复杂查询 < 3秒。
- 批量操作（如导入1000条数据）执行时间 < 30秒。
- 系统在10,000条人员数据下运行流畅，无明显卡顿。

### 10.6 安全验收
- 敏感字段在列表页脱敏显示，详情页按需展示。
- 操作日志记录完整，关键动作可追溯。
- 权限控制有效，无越权访问现象。
- 表单提交防重复，数据传输加密。

## 12. 数据结构与字段字典

> 说明：本章用于统一"实体结构、字段口径、关系约束"，支撑研发建模、接口联调与测试验收。字段命名采用英文 snake/camel 均可，但语义必须与下述字典一致。

### 12.1 数据域划分
- **组织域**：部门、行政区划、条线、条线节点。
- **人员域**：人员主档、任职信息、秘书关系。
- **流程域**：转调审批单、流程配置、待生效任务。
- **协作域**：外部组织、外部人员、临时组织提醒。
- **规则域**：可见性规则、验证日志、展示配置、自定义字段。

### 12.2 核心实体关系
- 一个 `Person` 可对应多个 `Appointment`（一人多岗）。
- 一个 `TransferRequest` 对应一个人员转调流程，可关联零到多个 `TransferScheduleTask`。
- 一个 `LineNode` 可关联多个成员（`LineMember`）。
- 一个 `VisibilityRule` 可作用于多个主体与客体（多对多关系，Demo 先用数组表示）。
- 一个 `ExternalPerson` 必须归属一个 `ExternalOrg`。

- 审批单"审批通过"后，必须保证人员主部门与条线同步更新。
- 定时任务完成后，审批单状态与任务状态必须同步收敛。
- 外部人员到期检查需幂等，重复执行不应重复变更异常状态。
- 条线节点删除时，需先处理子节点和关联成员。
- 自定义字段删除时，需检查是否被其他配置引用。

## 13. 埋点方案（新增）

> 目标：形成"功能使用 -> 流程转化 -> 结果质量"的可观测闭环，为后续迭代提供数据依据。

### 13.1 埋点设计原则
- **一事一埋点**：关键动作必须有 start/success/fail 状态。
- **统一命名**：`模块_对象_动作`，全小写蛇形，如 `person_transfer_submit`。
- **最小必要字段**：不采集敏感明文，保留业务分析必要维度。
- **可归因**：所有事件必须包含角色、页面、时间、请求链路标识。
- **实时性**：事件应实时上报，确保数据及时性。
- **可扩展性**：埋点结构应支持后续新增字段和事件类型。

### 13.2 公共事件字段
- `event_name`：事件名
- `event_time`：事件时间（ISO）
- `page_path`：当前页面路由
- `user_role`：`platform_admin`/`org_admin`/`user`
- `operator_id`：操作人ID（脱敏/匿名ID）
- `request_id`：一次操作链路ID
- `result`：`success` / `fail`
- `error_code`：失败码（可空）
- `error_msg`：失败信息摘要（可空）
- `browser`：浏览器类型
- `device`：设备类型

### 13.4 漏斗指标设计

#### 13.4.1 转调流程漏斗
1. 打开转调弹窗 `person_transfer_open`
2. 提交转调 `person_transfer_submit`
3. 审批通过 `approval_action_result` (action=pass)
4. 执行生效 `transfer_schedule_run`

#### 13.4.2 外部人员接入漏斗
1. 提交申请 `external_person_apply_submit`
2. 审批通过 `external_person_approve_action` (action=pass)
3. 到期检查 `external_expiry_check_run`

#### 13.4.3 规则配置漏斗
1. 打开规则配置页 `visibility_rule_view`
2. 保存规则 `visibility_rule_save`
3. 验证规则 `visibility_verify_submit`

### 13.5 数据质量与分析建议
- 建立埋点数据质量监控，确保事件完整性和准确性。
- 定期分析关键指标，如转调流程成功率、规则验证通过率、导入导出成功率等。
- 针对异常数据进行根因分析，优化系统性能和用户体验。
- 结合业务场景，分析用户行为模式，为产品迭代提供数据支撑。
